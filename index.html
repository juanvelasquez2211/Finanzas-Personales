<!DOCTYPE html>
<html lang="es">
<head>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis Finanzas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
<div id="particles-bg"></div>

<h2>Finanzas Personales</h2>

<div class="nav">

<button onclick="mostrarSeccion('dashboard')">Inicio</button>

<button onclick="mostrarSeccion('movimientos')">Movimientos</button>

<button onclick="mostrarSeccion('estadisticas')">Estadísticas</button>

</div>

<div id="dashboard" class="seccion">

<div class="cards">

<div class="card ingreso">
<h3>Ingresos</h3>
<p id="ingresos">$0</p>
</div>

<div class="card egreso">
<h3>Egresos</h3>
<p id="egresos">$0</p>
</div>

<div class="card saldo">
<h3>Saldo</h3>
<p id="saldo">$0</p>
</div>

</div>

<canvas id="grafico"></canvas>
<div id="estadisticasResumen" class="stats-grid"></div>
<div id="resumenCategorias"></div>

</div>

<div id="movimientos" class="seccion">

<h3>Movimientos</h3>

<div class="tabla-container">
<table class="tabla-movimientos">

<table>

<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Categoria</th>
<th>Concepto</th>
<th>Monto</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaMovimientos"></tbody>

</table>

</div>

</div>

<div id="estadisticas" class="seccion">

<h3>Estadísticas</h3>

<select id="filtroMes">
<option value="todos">Todos los meses</option>
<option value="1">Enero</option>
<option value="2">Febrero</option>
<option value="3">Marzo</option>
<option value="4">Abril</option>
<option value="5">Mayo</option>
<option value="6">Junio</option>
<option value="7">Julio</option>
<option value="8">Agosto</option>
<option value="9">Septiembre</option>
<option value="10">Octubre</option>
<option value="11">Noviembre</option>
<option value="12">Diciembre</option>
</select>

<canvas id="graficoCategoria"></canvas>

<h3>Balance mensual</h3>

<canvas id="graficoMes"></canvas>

</div>

<button class="btnAdd" onclick="abrirForm()">+</button>

<div id="overlay" onclick="cerrarForm()"></div>

<div id="formContainer">

<form id="movForm">

<h3>Nuevo Movimiento</h3>

<input type="date" id="fecha" required>

<select id="tipo">
<option value="Ingreso">Ingreso</option>
<option value="Egreso">Egreso</option>
</select>

<select id="categoria"></select>

<input type="text" id="concepto" placeholder="Concepto">

<input type="text" id="monto" placeholder="$ 0">

<div class="formBtns">
<button type="submit">Guardar</button>
<button type="button" onclick="cerrarForm()">Cancelar</button>
</div>

</form>

</div>

<script src="app.js"></script>

</body>
</html>
